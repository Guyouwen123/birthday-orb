<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>祝福星体</title>
    <link rel="stylesheet" href="styles.css?v=20260619-fireworks-song-length" />
  </head>
  <body>
    <main class="birthday-app" aria-label="祝福星体">
      <section class="stage">
        <div class="topbar">
          <div>
            <p class="eyebrow">Birthday Archive</p>
            <h1>祝福星体</h1>
          </div>
          <div class="controls" aria-label="互动控制">
            <button class="icon-button" id="cameraButton" type="button" aria-label="开启摄像头手势选择" title="开启摄像头手势选择">
              <span class="camera-icon" aria-hidden="true"></span>
            </button>
            <button class="icon-button" id="musicButton" type="button" aria-label="播放生日快乐歌" title="播放生日快乐歌">
              <span class="spark-icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <div class="name-sequence" id="nameSequence" aria-hidden="true">
          <span data-char="何"></span>
          <span data-char="坤"></span>
          <span data-char="寰"></span>
          <span data-char="生"></span>
          <span data-char="日"></span>
          <span data-char="快"></span>
          <span data-char="乐"></span>
        </div>

        <div class="orb-wrap" id="orbWrap">
          <div class="gesture-layer" id="gestureLayer" aria-hidden="true">
            <video id="cameraFeed" playsinline muted></video>
            <canvas id="gestureCanvas"></canvas>
            <div class="finger-dot" id="fingerDot"></div>
          </div>
          <div class="orb-shadow" aria-hidden="true"></div>
          <canvas class="orb-canvas" id="orbCanvas" aria-label="可选择的祝福星体"></canvas>
          <div class="selection-card" id="selectionCard" aria-live="polite">
            <span class="selected-glyph" id="selectedGlyph">愿</span>
            <p id="selectedMessage">愿你新的一岁，所有奔赴都有回响。</p>
          </div>
        </div>

        <div class="hint-row">
          <span id="statusText">拖拽星体，或点击任意祝福片。</span>
          <span>开启摄像头后，用食指指向祝福片即可展开。</span>
        </div>
      </section>
    </main>

    <script src="app.js?v=20260619-fireworks-song-length"></script>
  </body>
</html>
